// =====================================================================
//  analysis.proto
//  -------------------------------------------------------------------
//  Contrato gRPC do serviço de Análise e Previsão.
//  Invocado pelo Servidor Principal para cálculos estatísticos,
//  deteção de padrões de poluição e previsão de riscos para a saúde.
// =====================================================================
syntax = "proto3";

option csharp_namespace = "OneHealth.Analysis";

package onehealth.analysis;

// ---------------------------------------------------------------------
// Mensagem comum: um ponto de dados já normalizado
// ---------------------------------------------------------------------
message DataPoint {
    string sensor_id  = 1;
    string zona       = 2;
    string tipo_dado  = 3;
    double valor      = 4;
    string timestamp  = 5;   // ISO-8601
}

// ---------------------------------------------------------------------
// Pedido genérico de análise
// ---------------------------------------------------------------------
message AnalysisRequest {
    repeated DataPoint dados      = 1;
    string             tipo_dado  = 2;   // filtro opcional
    string             zona       = 3;   // filtro opcional
    string             sensor_id  = 4;   // filtro opcional
    string             inicio     = 5;   // janela temporal (ISO-8601)
    string             fim        = 6;
}

// ---------------------------------------------------------------------
// Resposta — estatísticas
// ---------------------------------------------------------------------
message StatisticsResponse {
    int32  n            = 1;
    double media        = 2;
    double mediana      = 3;
    double minimo       = 4;
    double maximo       = 5;
    double desvio_padrao = 6;
    double p25          = 7;
    double p75          = 8;
    string tipo_dado    = 9;
    string zona         = 10;
}

// ---------------------------------------------------------------------
// Resposta — deteção de padrões / anomalias
// ---------------------------------------------------------------------
message Anomaly {
    string sensor_id  = 1;
    string zona       = 2;
    string tipo_dado  = 3;
    double valor      = 4;
    string timestamp  = 5;
    double z_score    = 6;
    string severidade = 7;   // BAIXA | MEDIA | ALTA | CRITICA
    string descricao  = 8;
}

message PatternResponse {
    repeated Anomaly anomalias  = 1;
    string           tendencia  = 2;   // SUBIDA | DESCIDA | ESTAVEL
    double           inclinacao = 3;   // coef. da regressão linear
    string           resumo     = 4;
}

// ---------------------------------------------------------------------
// Resposta — previsão de risco para a saúde pública
// ---------------------------------------------------------------------
message HealthRiskResponse {
    string indicador        = 1;  // ex: IQA / WHO-AQG
    double valor_previsto   = 2;  // próximo ponto previsto
    string nivel_risco      = 3;  // BOM | MODERADO | MAU | MUITO_MAU
    string recomendacao     = 4;  // ex: "evitar atividade ao ar livre"
    repeated string grupos_vulneraveis = 5;
}

// ---------------------------------------------------------------------
// Serviço
// ---------------------------------------------------------------------
service AnalysisService {
    rpc ComputeStatistics  (AnalysisRequest) returns (StatisticsResponse);
    rpc DetectPatterns     (AnalysisRequest) returns (PatternResponse);
    rpc PredictHealthRisk  (AnalysisRequest) returns (HealthRiskResponse);
    rpc Ping               (PingRequest)     returns (PingResponse);
}

message PingRequest  { string origem = 1; }
message PingResponse { string mensagem = 1; string timestamp = 2; }
